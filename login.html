<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:80px auto;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:14px;
    margin:8px 0;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SIUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

firebase.auth().onAuthStateChanged((user) => {
    if(user){
        localStorage.setItem("escolaId", user.uid);
        localStorage.setItem("escolaNome", user.email);
        window.location.href = "index.html";
    }
});
</script>

</head>

<body>

<h1>S.C.A.E</h1>

<div class="container">
    <h2>Login da Escola</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>
</div>

<script>
function entrar(){

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    firebase.auth().signInWithEmailAndPassword(email, senha)
    .then((userCredential) => {

        const user = userCredential.user;

        localStorage.setItem("escolaId", user.uid);
        localStorage.setItem("escolaNome", email);

        window.location.href = "index.html";

    })
    .catch((error) => {
        alert("Erro ao entrar: " + error.message);
    });
}
</script>

</body>
</html>
